# ========== SEED ==========

mutation SeedEnclosures {
  seedEnclosures {
    id
    name
    speciesId
    status
  }
}

mutation SeedAlerts {
  seedAlerts {
    id
    enclosureName
    variable
    severity
    resolved
  }
}

# ========== QUERIES ==========

query GetEnclosures {
  enclosures {
    id
    name
    speciesId
    photoUrl
    status
    lastReadings {
      temp
      humidity
      luminosity
      noise
      timestamp
    }
    limits {
      tempMin
      tempMax
      humidityMin
      humidityMax
    }
    actuators {
      fan
      nebulizer
      heater
      lamp
    }
  }
}

query GetEnclosure {
  enclosure(id: "rec_01") {
    id
    name
    speciesId
    status
    lastReadings {
      temp
      humidity
    }
    actuators {
      fan
      heater
    }
  }
}

query GetAlerts {
  alerts {
    id
    enclosureId
    enclosureName
    variable
    severity
    timestamp
    resolved
  }
}

query GetActiveAlerts {
  activeAlerts {
    id
    enclosureId
    enclosureName
    variable
    severity
    timestamp
  }
}

query GetVariants {
  latestVariants(enclosureId: "rec_01", limit: 5) {
    id
    enclosureId
    temperature
    humidity
    noises
    luminosity
    timestamp
  }
}

# ========== MUTATIONS ==========

mutation ToggleActuator {
  toggleActuator(
    enclosureId: "rec_01"
    actuatorType: "fan"
    state: true
  ) {
    success
    message
  }
}

mutation ToggleHeater {
  toggleActuator(
    enclosureId: "rec_01"
    actuatorType: "heater"
    state: false
  ) {
    success
    message
  }
}

mutation ResolveAlert {
  resolveAlert(alertId: "AQUI_VAI_O_ID_DO_ALERTA") {
    id
    enclosureName
    resolved
  }
}

mutation CreateAlert {
  createAlert(input: {
    enclosureId: "rec_01"
    enclosureName: "Onça Pintada"
    variable: "Umidade Baixa"
    severity: "warning"
  }) {
    id
    enclosureId
    enclosureName
    variable
    severity
    timestamp
    resolved
  }
}

mutation CreateVariant {
  createVariant(input: {
    enclosureId: "rec_01"
    temperature: 28
    humidity: 75
    noises: 45
    luminosity: 500
    timestamp: "2024-01-01T12:00:00Z"
  }) {
    id
    enclosureId
    temperature
    humidity
    timestamp
  }
}