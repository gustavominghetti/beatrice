# ==========================================
# SEED - Dados Iniciais (Execute primeiro)
# ==========================================

mutation SeedEnclosures {
  seedEnclosures {
    id
    name
    speciesId
    status
  }
}

mutation SeedAlerts {
  seedAlerts {
    id
    enclosureName
    variable
    severity
    resolved
  }
}

# ==========================================
# CONSULTAS - Queries
# ==========================================

query GetEnclosures {
  enclosures {
    id
    name
    speciesId
    photoUrl
    status
    lastReadings {
      temp
      humidity
      luminosity
      noise
      timestamp
    }
    limits {
      tempMin
      tempMax
      humidityMin
      humidityMax
    }
    actuators {
      fan
      nebulizer
      heater
      lamp
    }
  }
}

query GetEnclosure($id: ID!) {
  enclosure(id: $id) {
    id
    name
    speciesId
    status
    lastReadings {
      temp
      humidity
    }
    actuators {
      fan
      heater
      lamp
    }
  }
}

query GetAlerts {
  alerts {
    id
    enclosureId
    enclosureName
    variable
    severity
    timestamp
    resolved
  }
}

query GetActiveAlerts {
  activeAlerts {
    id
    enclosureId
    enclosureName
    variable
    severity
    timestamp
  }
}

query GetVariants($enclosureId: ID!, $limit: Int) {
  latestVariants(enclosureId: $enclosureId, limit: $limit) {
    id
    enclosureId
    temperature
    humidity
    noises
    luminosity
    timestamp
  }
}

# ==========================================
# MUTATIONS - Ações
# ==========================================

mutation ToggleActuator($enclosureId: ID!, $actuatorType: String!, $state: Boolean!) {
  toggleActuator(
    enclosureId: $enclosureId
    actuatorType: $actuatorType
    state: $state
  ) {
    success
    message
  }
}

mutation ResolveAlert($alertId: ID!) {
  resolveAlert(alertId: $alertId) {
    id
    enclosureName
    resolved
  }
}

mutation CreateAlert($input: AlertInput!) {
  createAlert(input: $input) {
    id
    enclosureId
    enclosureName
    variable
    severity
    timestamp
    resolved
  }
}

mutation CreateVariant($input: newVariantInput!) {
  createVariant(input: $input) {
    id
    enclosureId
    temperature
    humidity
    noises
    luminosity
    timestamp
  }
}

mutation CreateEnclosure($input: EnclosureInput!) {
  createEnclosure(input: $input) {
    id
    name
    speciesId
    photoUrl
    status
    limits {
      tempMin
      tempMax
      humidityMin
      humidityMax
    }
  }
}

mutation UpdateEnclosure($id: ID!, $input: UpdateEnclosureInput!) {
  updateEnclosure(id: $id, input: $input) {
    id
    name
    status
  }
}

mutation DeleteEnclosure($id: ID!) {
  deleteEnclosure(id: $id)
}

