type Variant {
    id: ID
    enclosureId: ID
    temp: Float
    humidity: Float
    noise: Float
    luminosity: Float
    timestamp: String
}

input newVariantInput {
    enclosureId: ID!
    temp: Float!
    humidity: Float!
    noise: Float!
    luminosity: Float!
    timestamp: String
}

type MetricStats {
    min: Float
    max: Float
    avg: Float
}

type DashboardStats {
    temp: MetricStats
    humidity: MetricStats
    noise: MetricStats
    luminosity: MetricStats
}

type EnclosureDashboard {
    enclosureId: ID!
    history: [Variant]
    stats: DashboardStats
}

type Query {
    latestVariants(enclosureId: ID!, limit: Int): [Variant]
    enclosureDashboard(enclosureId: ID!): EnclosureDashboard
}

type Mutation {
    createVariant(input: newVariantInput!): Variant
}

type Subscription {
    variantAdded(enclosureId: ID!): Variant
}