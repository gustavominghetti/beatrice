# ==========================================
# SEED - Criar Colaboradores
# ==========================================

mutation SeedCollaborators {
  seedCollaborators {
    id
    email
    name
    role
    assignedEnclosures
  }
}

# ==========================================
# CONSULTAR COLABORADORES
# ==========================================

query GetAllCollaborators {
  collaborators {
    id
    email
    name
    role
    assignedEnclosures
  }
}

query GetCollaborator01 {
  collaborator(id: "collaborator_01") {
    id
    email
    name
    role
    assignedEnclosures
  }
}

# ==========================================
# CONSULTAR RECINTOS POR OPERADOR
# ==========================================

query GetEnclosuresForOperator1 {
  enclosures(operatorId: "operator_1") {
    id
    name
    speciesId
    status
    operatorIds
  }
}

query GetEnclosuresForOperator2 {
  enclosures(operatorId: "operator_2") {
    id
    name
    speciesId
    status
  }
}

query GetAllEnclosures {
  enclosures {
    id
    name
    operatorIds
  }
}

# ==========================================
# CONSULTAR RECINTO ESPECÍFICO
# ==========================================

query GetEnclosureDetail {
  enclosure(id: "rec_01") {
    id
    name
    speciesId
    status
    operatorIds
    lastReadings {
      temp
      humidity
    }
    limits {
      tempMin
      tempMax
    }
  }
}